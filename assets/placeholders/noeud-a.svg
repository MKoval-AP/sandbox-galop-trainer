<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <!-- Concrete background -->
  <rect width="200" height="230" fill="#B8B4AE"/>
  <line x1="30" y1="10" x2="45" y2="80" stroke="#A8A49E" stroke-width="0.8" opacity="0.6"/>
  <line x1="140" y1="20" x2="130" y2="90" stroke="#A8A49E" stroke-width="0.6" opacity="0.5"/>
  <line x1="10" y1="150" x2="70" y2="160" stroke="#A8A49E" stroke-width="0.7" opacity="0.5"/>
  <line x1="80" y1="5" x2="90" y2="55" stroke="#C4C0BA" stroke-width="0.5" opacity="0.4"/>

  <!-- INCORRECT KNOT A — simple overhand knot, cannot quick-release -->
  <!-- Ring/post at top -->
  <rect x="88" y="8" width="24" height="18" rx="4" fill="#8A7A6A" stroke="#6A5A4A" stroke-width="2"/>
  <rect x="92" y="12" width="16" height="10" rx="2" fill="#7A6A5A"/>

  <!-- Rope from ring, wraps in a simple overhand -->
  <!-- First loop (bottom layer) -->
  <path d="M 100,26 Q 105,50 120,70 Q 138,90 140,115 Q 140,130 128,138 Q 115,145 100,140"
        stroke="#C83A15" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Second loop crossing over -->
  <path d="M 100,26 Q 95,50 80,70 Q 62,92 62,115 Q 62,132 76,140 Q 88,147 100,140"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Knot tuck — rope goes through the loop and pulls tight -->
  <path d="M 100,140 Q 100,155 100,170"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Tight knot visual — rope jammed in centre -->
  <circle cx="100" cy="140" r="14" fill="#C83A15" stroke="#A82A08" stroke-width="2"/>
  <circle cx="100" cy="140" r="7" fill="#E85025"/>

  <!-- Free end going down — CANNOT be quick-released -->
  <path d="M 100,170 Q 102,188 100,205"
        stroke="#E84820" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- X mark showing not quick release -->
  <text x="118" y="185" font-size="18" fill="#8B0000" font-weight="bold" font-family="system-ui,sans-serif">✗</text>
  <text x="76" y="198" font-size="9" fill="#6A3010" font-family="system-ui,sans-serif" font-style="italic">nœud serré</text>

  <!-- Label -->
  <rect x="4" y="206" width="192" height="22" rx="4" fill="#CC4400" opacity="0.9"/>
  <text x="100" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="system-ui,sans-serif">A — Incorrect ✗</text>
</svg>
