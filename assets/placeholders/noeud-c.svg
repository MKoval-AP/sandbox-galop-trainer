<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <!-- Concrete background -->
  <rect width="200" height="230" fill="#B8B4AE"/>
  <line x1="30" y1="10" x2="45" y2="80" stroke="#A8A49E" stroke-width="0.8" opacity="0.6"/>
  <line x1="140" y1="20" x2="130" y2="90" stroke="#A8A49E" stroke-width="0.6" opacity="0.5"/>
  <line x1="10" y1="150" x2="70" y2="160" stroke="#A8A49E" stroke-width="0.7" opacity="0.5"/>

  <!-- INCORRECT KNOT C — loose slip loop (would slide/slip, not safe) -->
  <!-- Ring/post at top -->
  <rect x="88" y="8" width="24" height="18" rx="4" fill="#8A7A6A" stroke="#6A5A4A" stroke-width="2"/>
  <rect x="92" y="12" width="16" height="10" rx="2" fill="#7A6A5A"/>

  <!-- Rope simply looped around the ring without proper knot -->
  <!-- Goes from ring, makes a big loose loop, end just wrapped -->

  <!-- Main rope coming down from ring -->
  <path d="M 100,26 Q 100,45 100,60"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Big loose loop (slides under tension) -->
  <path d="M 100,60 Q 140,65 148,90 Q 155,115 140,135 Q 125,152 100,155"
        stroke="#C83A15" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Other side of loop -->
  <path d="M 100,60 Q 62,65 56,90 Q 50,118 65,138 Q 80,155 100,155"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The end just crosses loosely — no actual lock -->
  <path d="M 100,155 Q 100,168 100,178"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Arrow showing the rope would slip/slide -->
  <path d="M 148,90 Q 165,90 165,105" stroke="#8B0000" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <polygon points="162,105 168,105 165,115" fill="#8B0000"/>
  <text x="130" y="78" font-size="9" fill="#6A0000" font-family="system-ui,sans-serif" font-style="italic">glisse !</text>

  <!-- End rope dangling -->
  <path d="M 100,178 Q 100,192 98,205"
        stroke="#E84820" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Label -->
  <rect x="4" y="206" width="192" height="22" rx="4" fill="#CC4400" opacity="0.9"/>
  <text x="100" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="system-ui,sans-serif">C — Incorrect ✗</text>
</svg>
