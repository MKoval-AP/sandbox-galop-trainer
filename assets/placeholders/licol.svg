<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" style="background:#FAF3E0;">
  <text x="150" y="20" text-anchor="middle" font-size="13" fill="#8B5E3C" font-weight="bold">Licol</text>

  <!-- Têtière (top strap) -->
  <path d="M60 50 Q150 35 240 50" stroke="#8B5E3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Ref 1 -->
  <circle cx="150" cy="42" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="46" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">1</text>

  <!-- Montant gauche -->
  <path d="M65 52 Q60 100 65 145" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Ref 3 -->
  <circle cx="63" cy="85" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="63" y="89" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">3</text>

  <!-- Sous-gorge (right side strap going under jaw) -->
  <path d="M235 52 Q245 95 220 140" stroke="#8B5E3C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Ref 4 -->
  <circle cx="235" cy="85" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="235" y="89" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">4</text>

  <!-- Muserolle (nose strap) -->
  <path d="M70 145 Q150 130 230 145" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Ref 2 -->
  <circle cx="150" cy="135" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="139" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">2</text>

  <!-- Anneau de boucle (left buckle) -->
  <circle cx="70" cy="147" r="12" fill="none" stroke="#8B5E3C" stroke-width="3"/>
  <!-- Ref 5 -->
  <circle cx="50" cy="147" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="50" y="151" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">5</text>

  <!-- Anneau d'attache (chin ring) -->
  <circle cx="150" cy="210" r="14" fill="none" stroke="#8B5E3C" stroke-width="3"/>
  <!-- Ref 6 -->
  <circle cx="150" cy="210" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="214" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">6</text>

  <!-- Connecting straps to chin ring -->
  <path d="M70 155 Q100 190 138 208" stroke="#8B5E3C" stroke-width="5" fill="none"/>
  <path d="M220 150 Q195 185 163 208" stroke="#8B5E3C" stroke-width="5" fill="none"/>

  <!-- Longe (lead rope) -->
  <path d="M150 224 Q155 265 145 295" stroke="#D4A853" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Ref 7 -->
  <circle cx="150" cy="265" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="269" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">7</text>

  <!-- Snap hook at end -->
  <rect x="140" y="292" width="20" height="15" rx="3" fill="#C4A882" stroke="#8B5E3C" stroke-width="1.5"/>
</svg>
