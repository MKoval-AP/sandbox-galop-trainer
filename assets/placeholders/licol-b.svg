<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <rect width="200" height="230" fill="#EDE0C8"/>

  <!-- Neck -->
  <path d="M 10,230 Q 30,195 48,168 Q 58,162 72,162 Q 68,188 45,230 Z"
        fill="#C8873B" stroke="#8B5E3C" stroke-width="1.5"/>

  <!-- Head main shape -->
  <path d="M 72,26
           C 86,16 108,20 130,38
           C 150,55 166,80 168,108
           C 169,124 162,142 148,154
           C 138,164 120,167 100,163
           C 82,160 65,164 55,170
           C 44,158 38,142 42,120
           C 46,97 56,74 64,54
           C 67,40 69,32 72,26 Z"
        fill="#C8873B" stroke="#8B5E3C" stroke-width="1.5"/>

  <!-- Cheek highlight -->
  <ellipse cx="128" cy="88" rx="22" ry="18" fill="#D99A4A" opacity="0.35"/>

  <!-- Ear outer -->
  <polygon points="72,26 60,5 84,22" fill="#C8873B" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Ear inner -->
  <polygon points="72,24 65,10 80,22" fill="#E8B080"/>

  <!-- Forelock -->
  <path d="M 72,26 Q 78,34 80,46" stroke="#6B3A18" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 68,28 Q 74,38 74,50" stroke="#7B4A20" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eye -->
  <ellipse cx="118" cy="62" rx="12" ry="10" fill="#2A1800" stroke="#6B3A18" stroke-width="1.5"/>
  <ellipse cx="118" cy="62" rx="10" ry="8" fill="#3A2010"/>
  <circle cx="122" cy="59" r="3" fill="white" opacity="0.5"/>

  <!-- Nostril -->
  <path d="M 148,120 Q 160,117 164,125 Q 164,134 156,137 Q 147,137 146,129 Q 145,122 148,120 Z"
        fill="#9A4A20" stroke="#7A3010" stroke-width="1"/>

  <!-- Mouth line -->
  <path d="M 148,148 Q 158,150 164,147" stroke="#9A5028" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ===== CORRECT LICOL (B) — muserolle mid-nose ===== -->
  <!-- Licol color: orange-red like the book -->
  <!-- Têtière (poll strap) -->
  <path d="M 64,30 Q 72,24 82,26" stroke="#E84820" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Montant (cheek strap) -->
  <path d="M 66,32 Q 62,65 64,100" stroke="#E84820" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Muserolle — CORRECT: sits about 2 fingers below cheekbone, middle of nose -->
  <path d="M 64,100 Q 108,92 152,104" stroke="#E84820" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Sous-gorge (throat lash) -->
  <path d="M 66,32 Q 78,55 68,82 Q 60,95 64,100" stroke="#E84820" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Chin ring -->
  <ellipse cx="100" cy="140" rx="10" ry="7" fill="none" stroke="#E84820" stroke-width="3"/>
  <!-- Straps to ring -->
  <path d="M 64,102 Q 76,125 91,138" stroke="#E84820" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 152,106 Q 140,128 109,140" stroke="#E84820" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Buckle dot -->
  <circle cx="64" cy="100" r="4" fill="#C83010"/>

  <!-- Label -->
  <rect x="4" y="204" width="192" height="24" rx="4" fill="#5C8A3C" opacity="0.9"/>
  <text x="100" y="221" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="system-ui,sans-serif">B — Correct ✓</text>
</svg>
