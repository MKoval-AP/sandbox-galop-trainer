<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" style="background:#FAF3E0;">
  <text x="150" y="20" text-anchor="middle" font-size="13" fill="#8B5E3C" font-weight="bold">Filet</text>

  <!-- Têtière -->
  <path d="M55 45 Q150 28 245 45" stroke="#8B5E3C" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Ref 1 -->
  <circle cx="150" cy="38" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="42" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">1</text>

  <!-- Frontal (brow band) -->
  <path d="M60 55 Q150 65 240 55" stroke="#8B5E3C" stroke-width="6" fill="none"/>
  <!-- Ref 2 -->
  <circle cx="150" cy="62" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="66" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">2</text>

  <!-- Montant gauche -->
  <path d="M62 55 Q58 105 60 145" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Ref 3 -->
  <circle cx="58" cy="100" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="58" y="104" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">3</text>

  <!-- Sous-gorge -->
  <path d="M238 55 Q248 90 230 135" stroke="#8B5E3C" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Ref 6 -->
  <circle cx="243" cy="90" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="243" y="94" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">6</text>

  <!-- Muserolle -->
  <path d="M65 148 Q150 132 238 145" stroke="#8B5E3C" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Ref 4 -->
  <circle cx="150" cy="138" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="142" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">4</text>

  <!-- Cheeks connecting to bit -->
  <path d="M62 148 Q68 185 75 210" stroke="#8B5E3C" stroke-width="5" fill="none"/>
  <path d="M238 148 Q232 185 225 210" stroke="#8B5E3C" stroke-width="5" fill="none"/>

  <!-- Mors (bit) -->
  <rect x="72" y="205" width="156" height="12" rx="5" fill="#A0A0A0" stroke="#707070" stroke-width="2"/>
  <circle cx="80" cy="211" r="7" fill="none" stroke="#707070" stroke-width="2.5"/>
  <circle cx="220" cy="211" r="7" fill="none" stroke="#707070" stroke-width="2.5"/>
  <!-- Ref 5 -->
  <circle cx="150" cy="200" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="204" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">5</text>

  <!-- Rênes -->
  <path d="M80 218 Q70 260 65 310" stroke="#D4A853" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M220 218 Q230 260 235 310" stroke="#D4A853" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Ref 7 -->
  <circle cx="150" cy="270" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="150" y="274" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">7</text>
  <!-- Connecting rein band -->
  <path d="M65 310 Q150 320 235 310" stroke="#D4A853" stroke-width="4" fill="none"/>
</svg>
