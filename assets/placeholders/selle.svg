<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" style="background:#FAF3E0;">
  <text x="200" y="20" text-anchor="middle" font-size="13" fill="#8B5E3C" font-weight="bold">Selle</text>

  <!-- Saddle body / panels -->
  <ellipse cx="200" cy="190" rx="150" ry="55" fill="#C4A882" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Ref 5: Panneaux -->
  <circle cx="200" cy="225" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="200" y="229" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">5</text>

  <!-- Tree / seat area (arçon) -->
  <path d="M80 170 Q200 125 320 170" stroke="#8B5E3C" stroke-width="3" fill="#D9C4A0" stroke-linejoin="round"/>
  <path d="M80 170 Q200 145 320 170 Q310 180 200 170 Q90 180 80 170 Z" fill="#D4B896" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Ref 6: Arçon -->
  <circle cx="200" cy="148" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="200" y="152" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">6</text>

  <!-- Pommel (front) -->
  <ellipse cx="95" cy="153" rx="28" ry="20" fill="#C4A882" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Ref 1: Pommeau -->
  <circle cx="75" cy="145" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="75" y="149" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">1</text>

  <!-- Cantle (back) -->
  <ellipse cx="305" cy="153" rx="28" ry="20" fill="#C4A882" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Ref 3: Troussequin -->
  <circle cx="325" cy="145" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="325" y="149" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">3</text>

  <!-- Seat surface -->
  <path d="M115 158 Q200 140 285 158 Q270 172 200 170 Q130 172 115 158 Z" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="1"/>
  <!-- Ref 2: Siège -->
  <circle cx="200" cy="158" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="200" y="162" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">2</text>

  <!-- Flap / Quartier -->
  <rect x="110" y="170" width="80" height="80" rx="8" fill="#BFA882" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Ref 4: Quartier -->
  <circle cx="130" cy="185" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="130" y="189" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">4</text>

  <!-- Girth / Sous-ventrière straps -->
  <rect x="118" y="240" width="14" height="40" rx="3" fill="#8B5E3C"/>
  <rect x="137" y="240" width="14" height="40" rx="3" fill="#8B5E3C"/>
  <!-- Ref 7: Sous-ventrière -->
  <circle cx="92" cy="250" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="92" y="254" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">7</text>

  <!-- Stirrup leather / Étrivière -->
  <rect x="260" y="168" width="10" height="70" rx="3" fill="#8B5E3C"/>
  <!-- Ref 8: Étrivière -->
  <circle cx="285" cy="175" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="285" y="179" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">8</text>

  <!-- Stirrup / Étrier -->
  <rect x="248" y="235" width="35" height="28" rx="4" fill="#C4A882" stroke="#8B5E3C" stroke-width="2.5"/>
  <rect x="262" y="258" width="10" height="6" rx="2" fill="#8B5E3C"/>
  <!-- Ref 9: Étrier -->
  <circle cx="305" cy="245" r="9" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.7"/>
  <text x="305" y="249" text-anchor="middle" font-size="9" fill="#5A3E2B" font-weight="bold">9</text>
</svg>
