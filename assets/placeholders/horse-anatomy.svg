<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" style="background:#FAF3E0;">
  <!-- Body -->
  <ellipse cx="260" cy="155" rx="120" ry="65" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Neck -->
  <path d="M340 110 Q370 75 380 50 Q370 40 355 45 Q350 70 330 100 Z" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Head -->
  <ellipse cx="415" cy="55" rx="38" ry="22" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="2" transform="rotate(-15,415,55)"/>
  <!-- Ear -->
  <polygon points="400,35 408,20 416,35" fill="#C4A882" stroke="#8B5E3C" stroke-width="1.5"/>
  <!-- Eye -->
  <circle cx="420" cy="50" r="4" fill="#5A3E2B"/>
  <!-- Nostril -->
  <ellipse cx="437" cy="62" rx="5" ry="3" fill="#C4A882" stroke="#8B5E3C" stroke-width="1"/>

  <!-- Legs front-left -->
  <rect x="310" y="210" width="18" height="70" rx="4" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Legs front-right -->
  <rect x="332" y="210" width="18" height="70" rx="4" fill="#C8B490" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Legs back-left -->
  <rect x="155" y="210" width="18" height="70" rx="4" fill="#D9C4A0" stroke="#8B5E3C" stroke-width="2"/>
  <!-- Legs back-right -->
  <rect x="177" y="210" width="18" height="70" rx="4" fill="#C8B490" stroke="#8B5E3C" stroke-width="2"/>

  <!-- Hooves -->
  <rect x="310" y="272" width="18" height="10" rx="3" fill="#5A3E2B"/>
  <rect x="332" y="272" width="18" height="10" rx="3" fill="#5A3E2B"/>
  <rect x="155" y="272" width="18" height="10" rx="3" fill="#5A3E2B"/>
  <rect x="177" y="272" width="18" height="10" rx="3" fill="#5A3E2B"/>

  <!-- Tail -->
  <path d="M140 155 Q80 145 60 170 Q80 200 100 185 Q80 175 100 165 Z" fill="#C4A882" stroke="#8B5E3C" stroke-width="1.5"/>

  <!-- Mane -->
  <path d="M340 100 Q360 70 375 50" stroke="#8B5E3C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M345 108 Q368 80 380 56" stroke="#8B5E3C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Withers line (garrot) -->
  <path d="M335 98 Q345 80 355 75" stroke="#8B5E3C" stroke-width="1" stroke-dasharray="3,3" fill="none"/>

  <!-- Reference numbered circles (for visual only) -->
  <circle cx="440" cy="60" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="440" y="64" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">1</text>

  <circle cx="375" cy="93" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="375" y="97" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">2</text>

  <circle cx="325" cy="174" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="325" y="178" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">3</text>

  <circle cx="150" cy="174" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="150" y="178" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">4</text>

  <circle cx="260" cy="126" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="260" y="130" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">5</text>

  <circle cx="340" cy="72" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="340" y="76" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">6</text>

  <circle cx="275" cy="72" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="275" y="76" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">7</text>

  <circle cx="135" cy="72" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="135" y="76" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">8</text>

  <circle cx="65" cy="90" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="65" y="94" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">9</text>

  <circle cx="325" cy="246" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="325" y="250" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">10</text>

  <circle cx="150" cy="222" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="150" y="226" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">11</text>

  <circle cx="150" cy="276" r="10" fill="white" stroke="#8B5E3C" stroke-width="1.5" opacity="0.6"/>
  <text x="150" y="280" text-anchor="middle" font-size="10" fill="#5A3E2B" font-weight="bold">12</text>
</svg>
