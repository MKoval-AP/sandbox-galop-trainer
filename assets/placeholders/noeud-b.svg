<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230">
  <!-- Concrete background -->
  <rect width="200" height="230" fill="#B8B4AE"/>
  <!-- Concrete texture cracks -->
  <line x1="30" y1="10" x2="45" y2="80" stroke="#A8A49E" stroke-width="0.8" opacity="0.6"/>
  <line x1="140" y1="20" x2="130" y2="90" stroke="#A8A49E" stroke-width="0.6" opacity="0.5"/>
  <line x1="10" y1="150" x2="70" y2="160" stroke="#A8A49E" stroke-width="0.7" opacity="0.5"/>
  <line x1="160" y1="140" x2="185" y2="180" stroke="#A8A49E" stroke-width="0.6" opacity="0.4"/>
  <line x1="80" y1="5" x2="90" y2="55" stroke="#C4C0BA" stroke-width="0.5" opacity="0.4"/>

  <!-- NŒUD DE CAVALIER (quick-release) — correct knot B -->
  <!-- Ring/post at top center -->
  <rect x="88" y="8" width="24" height="18" rx="4" fill="#8A7A6A" stroke="#6A5A4A" stroke-width="2"/>
  <rect x="92" y="12" width="16" height="10" rx="2" fill="#7A6A5A"/>

  <!-- Main rope coming from ring, looping around -->
  <!-- The rope goes: from ring down, wraps around creating main loop, then the bight goes through -->

  <!-- Under-pass segment (drawn first = bottom layer) -->
  <path d="M 100,26 Q 100,50 88,65 Q 75,80 70,95 Q 66,108 72,118"
        stroke="#D04010" stroke-width="8" fill="none" stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Main wrap around (over the first segment) -->
  <path d="M 100,26 Q 100,50 114,65 Q 128,80 130,100 Q 130,115 118,122 Q 105,128 95,122 Q 85,116 82,105 Q 80,95 84,88"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- The bight (loop) going through: highlight in lighter shade -->
  <path d="M 72,118 Q 72,132 82,138 Q 92,143 100,140"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- The bight loop visible -->
  <path d="M 100,140 Q 120,144 124,134 Q 126,122 118,122"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Free end (tail) hanging down — can be pulled to release -->
  <path d="M 72,118 Q 64,138 60,162 Q 58,178 62,195"
        stroke="#E84820" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Crossing overlap cover (to show which goes over) -->
  <path d="M 84,88 Q 80,95 82,105"
        stroke="#E84820" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Arrow indicating quick-release direction -->
  <path d="M 62,195 L 55,210 L 70,205 Z" fill="#E84820"/>
  <text x="75" y="212" font-size="10" fill="#6A3010" font-family="system-ui,sans-serif" font-style="italic">tirer pour libérer</text>

  <!-- Label -->
  <rect x="4" y="206" width="192" height="22" rx="4" fill="#5C8A3C" opacity="0.9"/>
  <text x="100" y="222" text-anchor="middle" font-size="13" fill="white" font-weight="bold" font-family="system-ui,sans-serif">B — Nœud de cavalier ✓</text>
</svg>
